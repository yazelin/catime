  <script>
    // Theme toggle (mirrors main site logic)
    (function(){
      var saved = localStorage.getItem('catime-theme');
      if (saved === 'dark') document.documentElement.setAttribute('data-theme','dark');
      var btn = document.getElementById('theme-toggle');
      var moonSVG = '<svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
      var sunSVG = '<svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4" stroke="none"/><path fill="none" d="M12 2v3m0 14v3M4.22 4.22l2.12 2.12m11.32 11.32l2.12 2.12M2 12h3m14 0h3M4.22 19.78l2.12-2.12m11.32-11.32l2.12-2.12"/></svg>';
      btn.innerHTML = document.documentElement.getAttribute('data-theme') === 'dark' ? sunSVG : moonSVG;
      btn.addEventListener('click', function(){
        var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
        localStorage.setItem('catime-theme', isDark ? 'light' : 'dark');
        btn.innerHTML = isDark ? moonSVG : sunSVG;
      });
    })();
  </script>
  <script>
    // Populate character bar (same as index, with active highlight)
    (function(){
      var bar = document.getElementById('character-bar');
      if (!bar) return;
      var params = new URLSearchParams(window.location.search);
      var currentId = params.get('id') || '';
      fetch('https://raw.githubusercontent.com/yazelin/catime/main/characters/index.json').then(function(r){ return r.json(); }).then(function(idx){
        var chars = (idx.characters || []).filter(function(c){ return c.enabled; });
        // build anchors synchronously in index order (fixed order), fill names async
        chars.forEach(function(c){
          var a = document.createElement('a');
          a.href = 'character.html?id=' + encodeURIComponent(c.id);
          if (c.id === currentId) a.classList.add('active');
          a.innerHTML = '<span class="char-avatar"><img src="avatars/' + c.id + '.webp" alt="' + c.id + '" width="40" height="40" loading="lazy"></span>' +
            '<span class="char-bar-name">' + c.id + '</span>';
          bar.appendChild(a);
          fetch('https://raw.githubusercontent.com/yazelin/catime/main/characters/' + c.file).then(function(r){ return r.json(); }).then(function(data){
            var nm = (data.name ? data.name.zh : data.id);
            var lbl = a.querySelector('.char-bar-name'); if (lbl) lbl.textContent = nm;
            var img = a.querySelector('img'); if (img) img.alt = nm;
          }).catch(function(){});
        });
      }).catch(function(){});
    })();
  </script>
  <script>
    // Nav shell: social popover + character switcher (mobile) + comment + tab bar
    (function(){
      var socialToggle = document.getElementById('social-toggle');
      var socialPop = document.getElementById('social-pop');
      var charBar = document.getElementById('character-bar');
      var tabbar = document.getElementById('tabbar');
      if (!socialToggle || !socialPop) return;
      function setTab(id, on){ var t = document.getElementById(id); if (t) t.classList.toggle('active', on); }
      function openSocial(open){
        socialPop.classList.toggle('open', open);
        if (open && charBar) charBar.classList.remove('char-open');
        setTab('tab-social', open); if (open) setTab('tab-char', false);
      }
      function openChar(open){
        if (!charBar) return;
        charBar.classList.toggle('char-open', open);
        if (open) socialPop.classList.remove('open');
        setTab('tab-char', open); if (open) setTab('tab-social', false);
      }
      socialToggle.addEventListener('click', function(e){ e.stopPropagation(); openSocial(!socialPop.classList.contains('open')); });
      socialPop.addEventListener('click', function(e){ e.stopPropagation(); });
      if (charBar) charBar.addEventListener('click', function(e){ e.stopPropagation(); });
      document.addEventListener('click', function(){ socialPop.classList.remove('open'); if (charBar) charBar.classList.remove('char-open'); setTab('tab-social', false); setTab('tab-char', false); });

      var actComment = document.getElementById('act-comment');
      if (actComment) actComment.addEventListener('click', function(e){ e.stopPropagation(); var g = document.getElementById('giscus-toggle'); if (g) g.click(); });

      function bindTab(id, fn){ var t = document.getElementById(id); if (t) t.addEventListener('click', function(e){ e.stopPropagation(); fn(); }); }
      bindTab('tab-social', function(){ openSocial(!socialPop.classList.contains('open')); });
      bindTab('tab-char', function(){ openChar(!(charBar && charBar.classList.contains('char-open'))); });
      bindTab('tab-comment', function(){ var g = document.getElementById('giscus-toggle'); if (g) g.click(); });

      function syncTabbarH(){ if (tabbar) document.documentElement.style.setProperty('--tabbar-h', tabbar.offsetHeight + 'px'); }
      syncTabbarH();
      window.addEventListener('resize', syncTabbarH);
      if (window.ResizeObserver && tabbar) new ResizeObserver(syncTabbarH).observe(tabbar);
    })();

    // Giscus comment panel — one thread per character (data-term = char-<id>)
    (function() {
      var toggle = document.getElementById('giscus-toggle');
      var panel = document.getElementById('giscus-panel');
      var closeBtn = document.getElementById('giscus-panel-close');
      var loaded = false;
      var charId = new URLSearchParams(window.location.search).get('id') || 'unknown';
      function theme(){
        var t = document.documentElement.getAttribute('data-theme');
        if (t) return t === 'dark' ? 'dark' : 'light';
        return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }
      function load(){
        if (loaded) return;
        var section = document.getElementById('giscus-section');
        if (!section) return;
        var mount = document.createElement('div'); mount.id = 'giscus-mount'; section.appendChild(mount);
        var s = document.createElement('script');
        s.src = 'https://giscus.app/client.js';
        s.setAttribute('data-repo', 'yazelin/catime');
        s.setAttribute('data-repo-id', 'R_kgDOREojMg');
        s.setAttribute('data-category', 'General');
        s.setAttribute('data-category-id', 'DIC_kwDOREojMs4C2KHU');
        s.setAttribute('data-mapping', 'specific');
        s.setAttribute('data-term', 'char-' + charId);
        s.setAttribute('data-strict', '0');
        s.setAttribute('data-reactions-enabled', '1');
        s.setAttribute('data-emit-metadata', '0');
        s.setAttribute('data-input-position', 'top');
        s.setAttribute('data-theme', theme());
        s.setAttribute('data-lang', 'zh-TW');
        s.setAttribute('data-loading', 'lazy');
        s.crossOrigin = 'anonymous'; s.async = true;
        mount.appendChild(s); loaded = true;
      }
      function open(){ if (!panel) return; panel.classList.add('open'); panel.setAttribute('aria-hidden','false'); load(); if (closeBtn) closeBtn.focus(); }
      function close(){ if (!panel) return; panel.classList.remove('open'); panel.setAttribute('aria-hidden','true'); }
      if (toggle) toggle.addEventListener('click', function(){ panel.classList.contains('open') ? close() : open(); });
      if (closeBtn) closeBtn.addEventListener('click', close);
      document.addEventListener('keydown', function(e){ if (e.key === 'Escape' && panel && panel.classList.contains('open')) close(); });
      var themeBtn = document.getElementById('theme-toggle');
      if (themeBtn) themeBtn.addEventListener('click', function(){ setTimeout(function(){ var f = document.querySelector('.giscus-frame'); if (f) f.contentWindow.postMessage({ giscus: { setConfig: { theme: theme() } } }, 'https://giscus.app'); }, 50); });
    })();
  </script>

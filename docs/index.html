  <script>
    // Floating Giscus panel with lazy-load
    (function() {
      var toggle = document.getElementById('giscus-toggle');
      var panel = document.getElementById('giscus-panel');
      var closeBtn = document.getElementById('giscus-panel-close');
      var giscusLoaded = false;

      function getGiscusTheme() {
        var currentTheme = document.documentElement.getAttribute('data-theme');
        if (currentTheme) {
          return currentTheme === 'dark' ? 'dark' : 'light';
        }
        return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }

      function loadGiscus() {
        if (giscusLoaded) return;
        var section = document.getElementById('giscus-section');
        if (!section) return;
        var mount = document.getElementById('giscus-mount');
        if (!mount) {
          mount = document.createElement('div');
          mount.id = 'giscus-mount';
          section.appendChild(mount);
        }
        var s = document.createElement('script');
        s.src = 'https://giscus.app/client.js';
        s.setAttribute('data-repo', 'yazelin/catime');
        s.setAttribute('data-repo-id', 'R_kgDOREojMg');
        s.setAttribute('data-category', 'General');
        s.setAttribute('data-category-id', 'DIC_kwDOREojMs4C2KHU');
        s.setAttribute('data-mapping', 'pathname');
        s.setAttribute('data-strict', '0');
        s.setAttribute('data-reactions-enabled', '1');
        s.setAttribute('data-emit-metadata', '0');
        s.setAttribute('data-input-position', 'top');
        s.setAttribute('data-theme', getGiscusTheme());
        s.setAttribute('data-lang', 'zh-TW');
        s.setAttribute('data-loading', 'lazy');
        s.crossOrigin = 'anonymous';
        s.async = true;
        mount.appendChild(s);
        giscusLoaded = true;
      }

      function openPanel() {
        if (!panel) return;
        panel.classList.add('open');
        panel.setAttribute('aria-hidden', 'false');
        if (toggle) toggle.setAttribute('aria-expanded', 'true');
        loadGiscus();
        if (closeBtn) closeBtn.focus();
      }

      function closePanel() {
        if (!panel) return;
        panel.classList.remove('open');
        panel.setAttribute('aria-hidden', 'true');
        if (toggle) toggle.setAttribute('aria-expanded', 'false');
      }

      function togglePanel() {
        if (!panel) return;
        if (panel.classList.contains('open')) {
          closePanel();
        } else {
          openPanel();
        }
      }

      if (toggle) toggle.addEventListener('click', togglePanel);
      if (closeBtn) closeBtn.addEventListener('click', closePanel);
      document.addEventListener('keydown', function(event) {
        if (event.key === 'Escape' && panel && panel.classList.contains('open')) {
          closePanel();
        }
      });

      // Sync Giscus theme on toggle
      var themeToggle = document.getElementById('theme-toggle');
      if (themeToggle) {
        themeToggle.addEventListener('click', function() {
          setTimeout(function() {
            var iframe = document.querySelector('.giscus-frame');
            if (iframe) {
              iframe.contentWindow.postMessage(
                { giscus: { setConfig: { theme: getGiscusTheme() } } },
                'https://giscus.app'
              );
            }
          }, 50);
        });
      }
    })();
  </script>

  <script>
    // Populate character bar from characters/index.json
    (function(){
      var bar = document.getElementById('character-bar');
      if (!bar) return;
      fetch('https://raw.githubusercontent.com/yazelin/catime/main/characters/index.json').then(function(r){ return r.json(); }).then(function(idx){
        var chars = (idx.characters || []).filter(function(c){ return c.enabled; });
        chars.forEach(function(c){
          fetch('https://raw.githubusercontent.com/yazelin/catime/main/characters/' + c.file).then(function(r){ return r.json(); }).then(function(data){
            var a = document.createElement('a');
            a.href = 'character.html?id=' + encodeURIComponent(data.id);
            a.innerHTML = '<span class="char-avatar"><img src="avatars/' + data.id + '.webp" alt="' + (data.name ? data.name.zh : data.id) + '" width="40" height="40" loading="lazy"></span>' +
              '<span>' + (data.name ? data.name.zh : data.id) + '</span>';
            bar.appendChild(a);
          });
        });
      }).catch(function(){});
    })();

    // Sync header height to CSS variable for timeline positioning
    (function(){
      var sh = document.getElementById('sticky-header');
      if (!sh) return;
      function sync() {
        document.documentElement.style.setProperty('--header-offset', sh.offsetHeight + 'px');
      }
      sync();
      if ('ResizeObserver' in window) {
        new ResizeObserver(sync).observe(sh);
      } else {
        window.addEventListener('load', sync);
        window.addEventListener('resize', sync);
      }
      new MutationObserver(sync).observe(document.getElementById('character-bar') || document.body, {childList:true});
    })();

    // Mobile filter bottom-sheet: collapse filters + social links behind one
    // button so the sticky header stays slim. Desktop untouched (>600px).
    (function(){
      var filters = document.querySelector('.filters');
      var toggle = document.getElementById('filter-toggle');
      var backdrop = document.getElementById('sheet-backdrop');
      var closeBtn = document.getElementById('sheet-close');
      var socialBox = document.getElementById('sheet-social');
      var topbar = document.getElementById('topbar');
      if (!filters || !toggle || !backdrop || !socialBox || !topbar) return;
      var socials = Array.prototype.slice.call(
        document.querySelectorAll('#topbar .github-link, #topbar .tg-link, #topbar .fb-link, #topbar .bmc-link, #topbar .rss-link')
      );
      var mq = window.matchMedia('(max-width: 600px)');

      function placeSocials(){
        // move the actual nodes (keeps their links) into the sheet on mobile,
        // back to the topbar on desktop — no duplication, no re-wiring.
        socials.forEach(function(a){ (mq.matches ? socialBox : topbar).appendChild(a); });
      }
      function setOpen(open){
        filters.classList.toggle('open', open);
        backdrop.classList.toggle('open', open);
        document.body.style.overflow = open ? 'hidden' : '';
      }
      function updateActive(){
        var active = ['search-input','character-filter','inspiration-filter','model-filter'].some(function(id){
          var el = document.getElementById(id); return el && el.value;
        });
        var dateBtn = document.getElementById('date-picker-btn');
        if (dateBtn && dateBtn.classList.contains('active')) active = true;
        toggle.classList.toggle('has-active', active);
      }

      toggle.addEventListener('click', function(){ setOpen(!filters.classList.contains('open')); });
      backdrop.addEventListener('click', function(){ setOpen(false); });
      if (closeBtn) closeBtn.addEventListener('click', function(){ setOpen(false); });

      ['character-filter','inspiration-filter','model-filter'].forEach(function(id){
        var el = document.getElementById(id);
        if (el) el.addEventListener('change', function(){ updateActive(); if (mq.matches) setOpen(false); });
      });
      var searchEl = document.getElementById('search-input');
      if (searchEl) searchEl.addEventListener('input', updateActive);
      var randomBtn = document.getElementById('random-cat-btn');
      if (randomBtn) randomBtn.addEventListener('click', function(){ if (mq.matches) setOpen(false); });
      document.addEventListener('click', function(e){
        if (e.target.closest('#date-picker') || e.target.id === 'dd-clear') setTimeout(updateActive, 0);
      });

      placeSocials();
      updateActive();
      var onChange = function(){ placeSocials(); if (!mq.matches) setOpen(false); };
      if (mq.addEventListener) mq.addEventListener('change', onChange); else mq.addListener(onChange);
    })();
  </script>
